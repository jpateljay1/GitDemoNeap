name: Selenium Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        mkdir -p Reports
        python -m pytest testCases/test_login.py --headless -rA --color=yes --junitxml=Reports/result.xml --html=Reports/pytest_html_report.html --self-contained-html

    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: |
          Reports/result.xml

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      if: always()
      with:
        name: pytest-report
        path: Reports/
